name: Infra_migration_private_runners

on:
  workflow_dispatch:
    inputs:
      CloudProvider:
        description: 'AWS or AZURE'
        required: true
        default: 'azure'
        type: choice
        options:
          - aws
          - azure
      AccountsORSubscription:
        description: 'AWS account name OR AZURE Subscription name'
        required: true
        default: 'account1'
      Project:
        description: 'Project Name'
        required: true
        default: 'project1'
      Environment:
        description: 'Environment Name'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  TF_WORKING_DIR: ${{ github.event.inputs.CloudProvider }}/${{ github.event.inputs.AccountsORSubscription }}/${{ github.event.inputs.Project }}/${{ github.event.inputs.Environment }}
  ghsecret: ${{ github.event.inputs.CloudProvider }}_${{ github.event.inputs.AccountsORSubscription }}_${{ github.event.inputs.Project }}_${{ github.event.inputs.Environment }}_secret
  ghkey: ${{ github.event.inputs.CloudProvider }}_${{ github.event.inputs.AccountsORSubscription }}_${{ github.event.inputs.Project }}_${{ github.event.inputs.Environment }}_id

jobs:
  aws_plan:
    name: AWS Terraform Plan
    if: github.event.inputs.CloudProvider == 'aws'
    runs-on: self-hosted

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout Terraform modules
        uses: actions/checkout@v4
        with:
          repository: SandeepN1/Test_Terraform_Modules
          path: modules

      - name: Set AWS credential secret names
        shell: bash
        run: |
          ghsecret_m=$(echo "${{ env.ghsecret }}" | sed 's/-/_/g')
          ghkey_m=$(echo "${{ env.ghkey }}" | sed 's/-/_/g')
          echo "ghsecret_m=$ghsecret_m" >> "$GITHUB_ENV"
          echo "ghkey_m=$ghkey_m" >> "$GITHUB_ENV"

      - name: Verify toolchain
        run: |
          terraform version
          tflint --version
          jq --version

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform init

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform plan -out build.tfplan

      - name: Terraform show text
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform show -no-color build.tfplan > "$GITHUB_WORKSPACE/plan.txt"

      - name: Terraform show json
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform show -json build.tfplan > "$GITHUB_WORKSPACE/build_terraform.json"

      - name: TFLint init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tflint --init

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aws-terraform-plan
          path: |
            plan.txt
            build_terraform.json
          retention-days: 90

  aws_apply:
    name: AWS Terraform Apply
    if: github.event.inputs.CloudProvider == 'aws'
    runs-on: self-hosted
    needs: [aws_plan]
    environment: terraform-apply

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout Terraform modules
        uses: actions/checkout@v4
        with:
          repository: SandeepN1/Test_Terraform_Modules
          path: modules

      - name: Set AWS credential secret names
        shell: bash
        run: |
          ghsecret_m=$(echo "${{ env.ghsecret }}" | sed 's/-/_/g')
          ghkey_m=$(echo "${{ env.ghkey }}" | sed 's/-/_/g')
          echo "ghsecret_m=$ghsecret_m" >> "$GITHUB_ENV"
          echo "ghkey_m=$ghkey_m" >> "$GITHUB_ENV"

      - name: Verify toolchain
        run: terraform version

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform plan -out build.tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets[env.ghsecret_m] }}
          AWS_ACCESS_KEY_ID: ${{ secrets[env.ghkey_m] }}
        run: terraform apply -auto-approve build.tfplan

  azure_plan:
    name: Azure Terraform Plan
    if: github.event.inputs.CloudProvider == 'azure'
    runs-on: self-hosted

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout Terraform modules
        uses: actions/checkout@v4
        with:
          repository: SandeepN1/Test_Terraform_Modules
          path: modules

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Azure credential secret names
        shell: powershell
        run: |
          $ghsecret_m = "${{ env.ghsecret }}" -replace '-', '_'
          $ghkey_m = "${{ env.ghkey }}" -replace '-', '_'
          "ghsecret_m=$ghsecret_m" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ghkey_m=$ghkey_m" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify toolchain
        shell: powershell
        run: |
          terraform version
          if (Get-Command tflint -ErrorAction SilentlyContinue) {
            tflint --version
          } else {
            Write-Host "tflint not installed on runner; skipping optional TFLint checks."
          }
          jq --version
          az version

      - name: Azure login
        shell: powershell
        run: |
          az login --service-principal `
            -u "${{ secrets[env.ghkey_m] }}" `
            -p "${{ secrets[env.ghsecret_m] }}" `
            --tenant "${{ secrets.TENANT_ID }}"
          az account set --subscription "${{ secrets.SUBSCRIPTION_ID }}"
          az account show

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform init

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform plan -out build.tfplan

      - name: Terraform show text
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform show -no-color build.tfplan > "$GITHUB_WORKSPACE/plan.txt"

      - name: Terraform show json
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform show -json build.tfplan > "$GITHUB_WORKSPACE/build_terraform.json"

      - name: TFLint init
        shell: powershell
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if (Get-Command tflint -ErrorAction SilentlyContinue) {
            tflint --init
          } else {
            Write-Host "tflint not installed on runner; skipping optional TFLint init."
          }

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azure-terraform-plan
          path: |
            plan.txt
            build_terraform.json
          retention-days: 90

  azure_apply:
    name: Azure Terraform Apply
    if: github.event.inputs.CloudProvider == 'azure'
    runs-on: self-hosted
    needs: [azure_plan]
    environment: terraform-apply

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout Terraform modules
        uses: actions/checkout@v4
        with:
          repository: SandeepN1/Test_Terraform_Modules
          path: modules

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Azure credential secret names
        shell: powershell
        run: |
          $ghsecret_m = "${{ env.ghsecret }}" -replace '-', '_'
          $ghkey_m = "${{ env.ghkey }}" -replace '-', '_'
          "ghsecret_m=$ghsecret_m" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ghkey_m=$ghkey_m" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify toolchain
        run: |
          terraform version
          az version

      - name: Azure login
        shell: powershell
        run: |
          az login --service-principal `
            -u "${{ secrets[env.ghkey_m] }}" `
            -p "${{ secrets[env.ghsecret_m] }}" `
            --tenant "${{ secrets.TENANT_ID }}"
          az account set --subscription "${{ secrets.SUBSCRIPTION_ID }}"
          az account show

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform plan -out build.tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_SECRET: ${{ secrets[env.ghsecret_m] }}
          ARM_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          ARM_TENANT_ID: ${{ secrets.TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_TENANT_ID: ${{ secrets.TENANT_ID }}
          TF_VAR_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          TF_VAR_CLIENT_ID: ${{ secrets[env.ghkey_m] }}
          TF_VAR_SECRET: ${{ secrets[env.ghsecret_m] }}
        run: terraform apply -auto-approve build.tfplan
